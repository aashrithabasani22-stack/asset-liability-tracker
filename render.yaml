services:
  - type: web
    name: asset-tracker-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: http://localhost:5173
      - key: DATABASE_URL
        fromDatabase:
          name: asset-tracker-db
          property: connectionString

databases:
  - name: asset-tracker-db
    plan: free
